add:
  name: Add room to queue
  description: Adds a defined room to the cleaning queue.
  fields:
    room:
      name: Room
      description: Room name as defined in the integration options
      required: true
      example: Salon
      selector: {text: {}}
    suction:
      name: Suction level
      selector: {select: {options: [off, quiet, standard, strong, turbo]}}
    water:
      name: Mop / water level
      selector: {select: {options: [off, slightly_dry, moist, wet]}}
    repeats:
      name: Repeats
      selector: {number: {min: 1, max: 3, mode: box}}
remove:
  name: Remove item
  description: Removes an item from the queue (by item_id or 1-based position).
  fields:
    item_id: {name: Item ID, selector: {number: {mode: box}}}
    position: {name: Position, selector: {number: {min: 1, max: 50, mode: box}}}
move:
  name: Move item
  description: Moves a pending item to a new 1-based position.
  fields:
    item_id: {name: Item ID, selector: {number: {mode: box}}}
    position: {name: Position, selector: {number: {min: 1, max: 50, mode: box}}}
    new_position:
      name: New position
      required: true
      selector: {number: {min: 1, max: 50, mode: box}}
set_params:
  name: Set item parameters
  description: Changes suction/water/repeats of a pending item.
  fields:
    item_id: {name: Item ID, selector: {number: {mode: box}}}
    position: {name: Position, selector: {number: {min: 1, max: 50, mode: box}}}
    suction: {name: Suction, selector: {select: {options: [off, quiet, standard, strong, turbo]}}}
    water: {name: Water, selector: {select: {options: [off, slightly_dry, moist, wet]}}}
    repeats: {name: Repeats, selector: {number: {min: 1, max: 3, mode: box}}}
start: {name: Start queue, description: Starts processing the queue.}
pause: {name: Pause queue, description: Finishes the current room, then stops.}
skip: {name: Skip current room, description: Stops the robot and moves to the next room.}
clear: {name: Clear queue, description: Clears the queue and sends the robot home.}
import_rooms:
  name: Import rooms (bulk)
  description: >-
    Bulk-define rooms from a YAML/JSON mapping. Triggers an integration
    reload; a running queue will be paused.
  fields:
    rooms:
      name: Rooms
      description: "Mapping: room name -> {zone: [x1,y1,x2,y2], suction, water, repeats}"
      required: true
      example: >-
        {"Salon": {"zone": [-1200,-3000,3600,1500], "suction": "standard",
        "water": "moist", "repeats": 1}}
      selector: {object: {}}
    mode:
      name: Mode
      description: merge = add/update to existing rooms, replace = overwrite all
      default: merge
      selector: {select: {options: [merge, replace]}}
export_rooms:
  name: Export rooms
  description: Returns all room definitions (as an object and as ready-to-paste YAML).
save_preset:
  name: Save preset
  description: Saves the current queue (rooms + parameters, in order) as a named preset.
  fields:
    name:
      name: Preset name
      required: true
      example: Piątkowe sprzątanie
      selector: {text: {}}
load_preset:
  name: Load preset
  description: Loads a preset into the queue.
  fields:
    name:
      name: Preset name
      required: true
      selector: {text: {}}
    mode:
      name: Mode
      description: replace = replace queue (keeps the active room), append = add at the end
      default: replace
      selector: {select: {options: [replace, append]}}
delete_preset:
  name: Delete preset
  fields:
    name:
      name: Preset name
      required: true
      selector: {text: {}}
import_rooms_from_dreame:
  name: Import rooms from Dreame
  description: >-
    Copies room definitions (names and bounds) from the dreame-vacuum map
    camera or vacuum entity attributes.
  fields:
    camera_entity:
      name: Map camera entity
      description: Leave empty to auto-detect (camera.<vacuum>_map)
      selector: {entity: {domain: camera}}
    mode:
      name: Mode
      default: merge
      selector: {select: {options: [merge, replace]}}
detect_rooms:
  name: Detect rooms from Dreame
  description: >-
    Imports room definitions from the dreame-vacuum 'rooms' attribute
    (map camera or vacuum entity). Returns the number of imported rooms.
  fields:
    mode:
      name: Mode
      default: merge
      selector: {select: {options: [merge, replace]}}
    camera_entity:
      name: Map camera entity
      description: Optional; by default derived from the vacuum entity (camera.<name>_map)
      selector: {entity: {domain: camera}}
run:
  name: Fill queue and start
  description: >-
    One-shot for automations: loads a preset and/or adds rooms, then starts
    the queue. Replace mode keeps the room currently being cleaned.
  fields:
    preset:
      name: Preset name
      description: Preset to load first (optional)
      example: Piątkowe sprzątanie
      selector: {text: {}}
    rooms:
      name: Rooms
      description: >-
        Optional list. Each item is a room name or an object
        {room, suction, water, repeats}.
      example: '["Kitchen", {"room": "Łazienka", "suction": "strong", "repeats": 2}]'
      selector: {object: {}}
    mode:
      name: Mode
      default: replace
      selector: {select: {options: [replace, append]}}
    start:
      name: Start after filling
      default: true
      selector: {boolean: {}}
stop:
  name: Stop queue
  description: Ends the session — stops the robot, sends it to the dock, keeps the list.
set_all_params:
  name: Set parameters for pending items
  description: Applies to all pending items, or only to item_ids when provided.
  fields:
    item_ids:
      name: Item IDs
      description: Optional list of queue item ids to limit the change to
      selector: {object: {}}
    suction: {name: Suction, selector: {select: {options: [off, quiet, standard, strong, turbo]}}}
    water: {name: Water, selector: {select: {options: [off, slightly_dry, moist, wet]}}}
    repeats: {name: Repeats, selector: {number: {min: 1, max: 3, mode: box}}}

note:
  name: Add feedback note
  description: >-
    Zapisuje notatkę użytkownika (co faktycznie się stało) do dziennika
    feedbacku wraz z pełnym stanem kolejki i robota.
  fields:
    text:
      name: Notatka
      description: Treść notatki
      required: true
      selector:
        text:
          multiline: true
